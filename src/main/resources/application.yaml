spring:
  application:
    name: todo-list

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/todo_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/todo-realm}

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
